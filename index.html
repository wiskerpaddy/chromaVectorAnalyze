<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma Chord Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CHROMA ENGINE v2</h1>
            <!-- ボタン一つでStart/Stopを切り替え -->
            <button id="toggleBtn">Start Analyzer</button>
        </header>

        <main>
            <!-- 判定されたコードを表示するエリア -->
            <div id="chordDisplay">
                <span class="label">DETECTED CHORD</span>
                <div id="chordName">---</div>
            </div>

            <div class="visualizer-wrapper">
                <!-- グラフのメモリ線 -->
                <div class="grid-lines">
                    <div class="line" style="bottom: 80%;"><span>0.8</span></div>
                    <div class="line" style="bottom: 60%;"><span>0.6</span></div>
                    <div class="line" style="bottom: 50%; border-top-color: var(--threshold-color);">
                        <span style="color: var(--threshold-color);">0.5 (Threshold)</span>
                    </div>
                    <div class="line" style="bottom: 40%;"><span>0.4</span></div>
                    <div class="line" style="bottom: 20%;"><span>0.2</span></div>
                </div>
                <div id="visualizer" class="chroma-grid"></div>
            </div>
            
            <div id="status">Status: Ready</div>
        </main>
    </div>
    <script src="engine.js"></script>
    <script src="main.js"></script>
</body>
</html>
