<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma Engine v2 - Sheet Music Mode</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <!-- abcjs ライブラリの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
</head>
<body>
    <div class="container">
        <h1>CHROMA ENGINE v2</h1>
        <div class="controls">
            <!-- 切り替えボタンを追加 -->
            <button id="modeToggle" onclick="toggleMode()">Mode: 3-Note</button>
            <button id="startBtn">Start Analyzer</button>
        </div>
        <main>
            <div id="chordDisplay">
                <span class="label">DETECTED CHORD</span>
                <div id="chordName">---</div>
            </div>

            <!-- 楽譜表示エリアを追加 -->
            <div id="sheet-music-wrapper" style="background: white; margin: 20px 0; border-radius: 8px; padding: 10px;">
                <div id="sheet-music"></div>
            </div>
            
            <!-- 履歴表示エリアを追加 -->
            <div id="chord-history" style="margin-bottom: 20px; font-family: monospace; color: #aaa; font-size: 0.9rem;">
                History: <span id="history-content">---</span>
            </div>

        <div class="visualizer-wrapper">
            <div class="grid-lines">
                <!-- 成功画像に合わせて目盛りを追加 -->
                <div class="line" style="bottom: 80%;"><span>0.8</span></div>
                <div class="line" style="bottom: 60%;"><span>0.6</span></div>
                <div class="line" style="bottom: 50%; border-top-color: var(--threshold-color);">
                    <span style="color: var(--threshold-color);">0.5 (Threshold)</span>
                </div>
                <div class="line" style="bottom: 40%;"><span>0.4</span></div>
            </div>
            <div id="visualizer" class="chroma-grid"></div>
        </div>
        </main>
    </div>
    <script src="engine.js"></script>
    <script src="main.js"></script>
    <script>
        // サービスワーカー（sw.js）をブラウザに登録する
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered!'))
                .catch(err => console.error('Service Worker failed:', err));
            });
        }
    </script>
</body>
</html>
